<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ikbal Ramdan Suhendar - Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <header class="sticky top-0 z-20 border-b border-slate-800 bg-slate-950/90 backdrop-blur">
      <div class="mx-auto flex w-full max-w-6xl items-center justify-between px-4 py-3 sm:px-6">
        <p class="text-sm font-semibold tracking-wide text-cyan-300">IKBAL PROFILE</p>
        <div class="flex items-center gap-2 rounded-full border border-slate-700 bg-slate-900 p-1">
          <button class="lang-btn active" data-lang="jp">JP</button>
          <button class="lang-btn" data-lang="en">EN</button>
          <button class="lang-btn" data-lang="id">ID</button>
        </div>
      </div>
    </header>

    <main class="mx-auto w-full max-w-6xl px-4 pb-16 pt-8 sm:px-6">
      <section class="reveal grid gap-6 rounded-2xl border border-slate-800 bg-slate-900/60 p-6 shadow-xl shadow-slate-950/30 md:grid-cols-[220px_1fr]">
        <div class="avatar-wrap">
          <div class="avatar">IR</div>
        </div>
        <div>
          <p class="inline-flex items-center rounded-full border border-cyan-400/40 bg-cyan-400/10 px-3 py-1 text-xs font-semibold tracking-wide text-cyan-300" data-i18n="heroBadge"></p>
          <h1 class="text-3xl font-bold sm:text-4xl">Ikbal Ramdan Suhendar</h1>
          <p class="mt-2 text-lg text-cyan-300" data-i18n="heroRole"></p>
          <p class="mt-4 leading-relaxed text-slate-300" data-i18n="heroSummary"></p>
          <div class="mt-6 flex flex-wrap gap-3">
            <a href="mailto:ikbalramdans29@gmail.com" class="rounded-lg bg-cyan-500 px-4 py-2 text-sm font-semibold text-slate-950 transition hover:bg-cyan-400">
              <span data-i18n="ctaContact"></span>
            </a>
            <a href="#skills" class="rounded-lg border border-slate-700 px-4 py-2 text-sm font-semibold transition hover:border-cyan-400 hover:text-cyan-300">
              <span data-i18n="ctaSkills"></span>
            </a>
          </div>
        </div>
      </section>

      <section class="reveal mt-8 rounded-2xl border border-slate-800 bg-slate-900/60 p-6">
        <h2 class="text-xl font-bold text-cyan-300" data-i18n="servicesTitle"></h2>
        <div id="servicesList" class="mt-4 grid gap-4 md:grid-cols-3"></div>
      </section>

      <section class="reveal mt-8 rounded-2xl border border-slate-800 bg-slate-900/60 p-6">
        <h2 class="text-xl font-bold text-cyan-300" data-i18n="aboutTitle"></h2>
        <p class="mt-3 leading-relaxed text-slate-300" data-i18n="aboutBody"></p>
      </section>

      <section id="skills" class="reveal mt-8 rounded-2xl border border-slate-800 bg-slate-900/60 p-6">
        <h2 class="text-xl font-bold text-cyan-300" data-i18n="skillsTitle"></h2>
        <ul id="skillsList" class="mt-4 flex flex-wrap gap-2"></ul>
      </section>

      <section class="reveal mt-8 rounded-2xl border border-slate-800 bg-slate-900/60 p-6">
        <h2 class="text-xl font-bold text-cyan-300" data-i18n="experienceTitle"></h2>
        <div id="experienceList" class="mt-5 space-y-4"></div>
      </section>

      <section class="reveal mt-8 grid gap-6 md:grid-cols-2">
        <div class="glass-card rounded-2xl border border-slate-800 bg-slate-900/60 p-6">
          <h2 class="text-xl font-bold text-cyan-300" data-i18n="educationTitle"></h2>
          <ul id="educationList" class="mt-4 space-y-3"></ul>
        </div>
        <div class="glass-card rounded-2xl border border-slate-800 bg-slate-900/60 p-6">
          <h2 class="text-xl font-bold text-cyan-300" data-i18n="certTitle"></h2>
          <ul id="certList" class="mt-4 space-y-3"></ul>
        </div>
      </section>

      <section class="reveal mt-8 rounded-2xl border border-slate-800 bg-slate-900/60 p-6">
        <h2 class="text-xl font-bold text-cyan-300" data-i18n="contactTitle"></h2>
        <p class="mt-3 text-slate-300" data-i18n="contactBody"></p>
        <p class="mt-3 text-sm text-slate-400">
          <span data-i18n="emailLabel"></span>:
          <a class="text-cyan-300 underline-offset-2 hover:underline" href="mailto:ikbalramdans29@gmail.com">ikbalramdans29@gmail.com</a>
        </p>
      </section>
    </main>

    <footer class="border-t border-slate-800 py-6">
      <p class="text-center text-sm text-slate-500" data-i18n="footerText"></p>
    </footer>

    <script src="./profile.js"></script>
    <script src="./i18n.js"></script>
  </body>
</html>
